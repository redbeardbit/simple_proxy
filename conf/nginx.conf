# OpenResty configuration
user  nobody;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log notice;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types.minimal;
    # default_type  application/octet-stream;  # Removed as we don't need it for proxy functionality

    server_tokens off;            
    more_clear_headers Server;    
    
    client_max_body_size 10m;     # Ограничиваем размер загружаемых файлов
    client_body_timeout 10s;      # Защита от медленной передачи тела запроса
    client_header_timeout 10s;    # Защита от медленной передачи заголовков
    send_timeout 10s;             # Защита от зависших ответов клиенту
    keepalive_timeout 30s;        # Разумный предел для соединений


    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log error;

    sendfile        on;
    #tcp_nopush     on;
    tcp_nodelay    on;

    #gzip  on;

    # Include additional configuration files
    include /etc/nginx/conf.d/*.conf;
    
    # Default server block for proxy health check
    server {
        listen 9080;
        server_name _;
        
        location / {
            root /var/www/html;
            index index.html index.htm;
        }
        
        location /info {
            default_type text/html;
            content_by_lua_block {
                local ffi = require("ffi")
                local list = {}
                
                -- Читаем активные конфиги из директории conf.d
                local handle = io.popen("ls /etc/nginx/conf.d/stand_*.conf")
                local result = handle:read("*a")
                handle:close()

                ngx.say("<html><body style='font-family:sans-serif; padding:20px;'>")
                ngx.say("<h1>OpenResty Proxy Status</h1>")
                ngx.say("<table border='1' cellpadding='10' style='border-collapse:collapse;'>")
                ngx.say("<tr style='background:#eee;'><th>Порт стенда</th><th>Файл конфигурации</th><th>Файл маппинга</th></tr>")

                for file in string.gmatch(result, "[^\r\n]+") do
                    local port = file:match("stand_(%d+).conf")
                    if port then
                        local map_file = "/etc/nginx/mappings/stand_" .. port .. ".map"
                        -- Проверяем наличие файла маппинга
                        local f = io.open(map_file, "r")
                        local map_status = f and "<span style='color:green;'>OK</span>" or "<span style='color:red;'>Missing</span>"
                        if f then f:close() end

                        ngx.say("<tr>")
                        ngx.say("<td><b>" .. port .. "</b></td>")
                        ngx.say("<td>" .. file .. "</td>")
                        ngx.say("<td>" .. map_file .. " (" .. map_status .. ")</td>")
                        ngx.say("</tr>")
                    end
                end

                ngx.say("</table>")
                ngx.say("<p><i>Последнее обновление: " .. os.date() .. "</i></p>")
                ngx.say("</body></html>")
            }
        }        
    }
}
