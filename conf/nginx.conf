# OpenResty configuration
user  nobody;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types.minimal;
    # default_type  application/octet-stream;  # Removed as we don't need it for proxy functionality

    server_tokens off;            
    more_clear_headers Server;    
    
    client_max_body_size 10m;     # Ограничиваем размер загружаемых файлов
    client_body_timeout 10s;      # Защита от медленной передачи тела запроса
    client_header_timeout 10s;    # Защита от медленной передачи заголовков
    send_timeout 10s;             # Защита от зависших ответов клиенту
    keepalive_timeout 30s;        # Разумный предел для соединений


    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log error;
    pid         /var/run/nginx.pid;

    sendfile        on;
    #tcp_nopush     on;
    tcp_nodelay    on;

    #gzip  on;

    # Include additional configuration files
    include /etc/nginx/conf.d/*.conf;
    
    # Default server block for proxy health check
    server {
        listen 9080;
        server_name localhost;
        
        location / {
            root /var/www/html;
            index index.html index.htm;
        }
        
        location /status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
    }
}
