# Main configuration for multi-stand proxy
# This file implements the proxy logic for multiple stands on different ports

# Define resolver for DNS resolution (moved to main config)
# resolver 8.8.8.8 valid=300s;
# resolver_timeout 5s;

# Map for Stand A (port 9081)
map $http_host $target_stand_a {
    default $http_host;
    include /etc/nginx/mappings/stand_9080.map;
}

# Map for Stand B (port 9082)
map $http_host $target_stand_b {
    default $http_host;
    include /etc/nginx/mappings/stand_9081.map;
}

# Server block for Stand A on port 9081
server {
    listen 9081;
    server_name _;

    location / {
        proxy_pass http://$target_stand_a;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Server block for Stand B on port 9082
server {
    listen 9082;
    server_name _;

    location / {
        proxy_pass http://$target_stand_b;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
